services:
  postgres:
    image: postgres:16
    container_name: syscode_postgres
    environment:
      POSTGRES_DB: syscode
      POSTGRES_USER: syscode
      POSTGRES_PASSWORD: syscode
    ports:
      - "5432:5432"
    volumes:
      - syscode_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syscode -d syscode"]
      interval: 5s
      timeout: 3s
      retries: 20

  liquibase:
    image: liquibase/liquibase:4.24
    container_name: syscode_liquibase
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --url=jdbc:postgresql://postgres:5432/syscode
      - --username=syscode
      - --password=syscode
      - --changeLogFile=/liquibase/changelog.xml
      - update
    volumes:
      - ./apps/profile-service/liquibase:/liquibase

volumes:
  syscode_pgdata:
