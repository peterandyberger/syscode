name: CI

on:
  push:
    branches:
      - master
      - "feature/**"
  pull_request:
    branches:
      - master

jobs:
  profile-service-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: syscode
          POSTGRES_PASSWORD: syscode
          POSTGRES_DB: syscode
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U syscode -d syscode"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: apps/profile-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Run Liquibase migrations
        run: |
          docker run --rm \
          --network host \
          -v "$GITHUB_WORKSPACE/apps/profile-service/liquibase:/workspace" \
          liquibase/liquibase:4.24 \
          --searchPath=/workspace \
          --changeLogFile=changelog.xml \
          --url=jdbc:postgresql://localhost:5432/syscode \
          --username=syscode \
          --password=syscode \
          update

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run e2e tests
        working-directory: apps/profile-service
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: syscode
          DB_PASS: syscode
          DB_NAME: syscode
          TYPEORM_SYNC: "false"
        run: npm run test:e2e

  address-service-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/address-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm test

  e2e-ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Start all services
        run: docker compose up -d --build

      - name: Wait for web
        run: timeout 120 sh -c 'until curl -sf http://localhost:4200 > /dev/null; do sleep 3; done'

      - name: Run UI e2e tests
        working-directory: playwright
        env:
          FRONTEND_URL: http://localhost:4200
          BACKEND_URL: http://localhost:3000
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npm run test:e2e:ui
          npm run test:e2e:api

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: playwright/reports/
